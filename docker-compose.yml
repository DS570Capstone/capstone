version: "3.9"

# ── Local CPU-only configuration ───────────────────────────────────────────────
# Kafka/Zookeeper removed. The Flask API catches NoBrokersAvailable and runs
# the ML pipeline inline in a background thread (see api/server.py _run_worker_inline).
# To restore Kafka for production, add back the kafka/zookeeper/worker services
# and set KAFKA_BOOTSTRAP to the real broker address.

x-common-env: &common-env
  DATABASE_URL: postgresql://liftlens:liftlens_secret@postgres:5432/liftlens
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: videos
  # Kafka address kept so server.py can attempt connection and fall back gracefully.
  # With no Kafka service running, the API uses the inline worker fallback.
  KAFKA_BOOTSTRAP: localhost:9092
  WANDB_API_KEY: ${WANDB_API_KEY:-}
  WANDB_PROJECT: ${WANDB_PROJECT:-liftlens-ohp}
  WANDB_ENABLED: ${WANDB_ENABLED:-false}
  ML_ROOT: /app/ml

services:

  # ── Frontend (Vite) ──────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: liftlens-frontend
    restart: unless-stopped
    depends_on:
      - api
    working_dir: /app
    # node_modules lives in a named volume so npm install only runs when
    # package.json changes, not on every container restart.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      VITE_API_PROXY_TARGET: http://api:5050
    mem_limit: 512m
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: liftlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: liftlens
      POSTGRES_PASSWORD: liftlens_secret
      POSTGRES_DB: liftlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liftlens"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (object storage for raw videos + annotated outputs) ────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: liftlens-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask API (also runs ML pipeline inline via background thread) ────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liftlens-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "5050:5050"
    environment:
      <<: *common-env
    command: ["python", "-m", "api.server"]
    # ML pipeline peaks at ~1.5 GB; 3 GB ceiling leaves headroom for annotated
    # video rendering without risking the host OOM-killer on a 16 GB laptop.
    mem_limit: 3g
    volumes:
      - ./backend/api:/app/api
      # Not read-only — pipeline writes processed artifacts to data/processed/
      # and outputs/; :ro would block subdirectory volume mounts.
      - ./ml/ohp_form_pipeline:/app/ml
      - ml_outputs:/app/ml/outputs
      # Cache HuggingFace models across container restarts (used if depth re-enabled)
      - hf_cache:/app/.cache/huggingface

volumes:
  postgres_data:
  minio_data:
  ml_outputs:
  hf_cache:
  # Persists node_modules across frontend container restarts.
  # Delete with: docker volume rm capstone_frontend_node_modules
  frontend_node_modules:
